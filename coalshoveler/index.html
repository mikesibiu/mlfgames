<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Coal Shoveler – Polar Express</title>
</head>
<body style="margin:0;padding:0;background:#000">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── constants ─────────────────────────────────────────────── */
    const WIN_COAL = 25;
    const MAX_COAL = 6;
    const SPAWN_INTERVAL = 1200; // ms

    const LEVELS = [
      { min: 0,  label: "Level 1 – Stoking Up",  drainPerSec: 4,  coalLife: 3000 },
      { min: 9,  label: "Level 2 – Full Steam",   drainPerSec: 7,  coalLife: 2200 },
      { min: 17, label: "Level 3 – Express!",     drainPerSec: 11, coalLife: 1500 },
    ];
    const getLevel = score => [...LEVELS].reverse().find(l => score >= l.min);

    let uid = 0;

    /* ── audio ──────────────────────────────────────────────────── */
    let _ctx = null;
    const ac = () => _ctx || (_ctx = new (window.AudioContext || window.webkitAudioContext)());

    const tone = (f, dur, vol = 0.3, t0 = 0, type = "sine") => {
      try {
        const c = ac(), o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = type; o.frequency.value = f;
        const t = c.currentTime + t0;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.start(t); o.stop(t + dur + 0.01);
      } catch (e) {}
    };

    const noise = (dur, vol = 0.2, t0 = 0) => {
      try {
        const c = ac();
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const g = c.createGain();
        src.connect(g); g.connect(c.destination);
        const t = c.currentTime + t0;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.start(t); src.stop(t + dur + 0.02);
      } catch (e) {}
    };

    const snd = {
      shovel() {
        // low thud
        tone(60, 0.14, 0.55, 0, "sine");
        tone(45, 0.1, 0.4, 0.03, "sine");
        noise(0.08, 0.18, 0.01);
      },
      furnace() {
        // whoosh + crackle
        noise(0.25, 0.3, 0);
        tone(180, 0.18, 0.22, 0, "sawtooth");
        tone(240, 0.12, 0.15, 0.08, "sawtooth");
        noise(0.12, 0.2, 0.18);
      },
      levelUp() {
        [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.3, 0.22, i * 0.11, "sine"));
      },
      win() {
        // jingle bells melody
        const m = [659,659,659, 659,659,659, 659,784,523,587,659];
        const d = [.12,.12,.25, .12,.12,.25, .12,.12,.12,.12,.45];
        let t = 0;
        m.forEach((f, i) => { tone(f, d[i], 0.28, t); t += d[i]; });
        setTimeout(() => {
          [523,659,784,1047,1319].forEach((f, i) => tone(f, 0.7, 0.22, i * 0.1));
        }, 1600);
      },
      gameOver() {
        [440, 370, 311, 262, 220].forEach((f, i) => tone(f, 0.35, 0.28, i * 0.22, "sawtooth"));
      },
    };

    /* ── star/snow generation (static) ──────────────────────────── */
    const STARS = Array.from({ length: 80 }, (_, i) => ({
      id: i,
      x: Math.random() * 100,
      y: Math.random() * 80,
      s: 1 + Math.random() * 2.2,
      d: 1.5 + Math.random() * 3,
    }));

    const SNOWFLAKES = Array.from({ length: 30 }, (_, i) => ({
      id: i,
      x: Math.random() * 100,
      s: 2 + Math.random() * 4,
      d: 5 + Math.random() * 8,
      delay: Math.random() * 8,
      dx: (Math.random() - 0.5) * 40,
    }));

    /* ── CSS ────────────────────────────────────────────────────── */
    const CSS = `
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');

      *, *::before, *::after { box-sizing: border-box; }

      .cs-root {
        width: 100vw; height: 100vh; overflow: hidden; position: relative;
        background: radial-gradient(ellipse at 50% 30%, #0e1a52 0%, #080e2e 55%, #040918 100%);
        font-family: 'Playfair Display', Georgia, serif;
        touch-action: manipulation;
      }

      /* stars */
      .st { position:absolute; border-radius:50%; background:#fff;
        animation: twinkle var(--d) ease-in-out infinite alternate; }
      @keyframes twinkle {
        from { opacity:.15; transform:scale(.7); }
        to   { opacity:1;   transform:scale(1.3); }
      }

      /* snow */
      .sn { position:absolute; top:-8px; border-radius:50%;
        background:rgba(255,255,255,.8); pointer-events:none;
        animation: snowfall var(--d) var(--delay) linear infinite; }
      @keyframes snowfall {
        from { transform:translateY(0) translateX(0); opacity:.9; }
        to   { transform:translateY(101vh) translateX(var(--dx)); opacity:.1; }
      }

      /* ── layout ── */
      .game-area {
        position: absolute; inset: 0;
        display: flex;
      }

      /* coal side */
      .coal-side {
        width: 45%;
        height: 100%;
        position: relative;
        background: linear-gradient(180deg,
          rgba(8,5,2,0) 0%,
          rgba(12,7,3,0.45) 60%,
          rgba(18,9,2,0.75) 100%
        );
        border-right: 2px solid rgba(80,50,20,0.4);
      }
      .coal-side::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 120px;
        background: radial-gradient(ellipse at 50% 100%, #1a0d04 0%, #0a0500 55%, transparent 100%);
        pointer-events: none;
      }
      .coal-pile-label {
        position: absolute;
        bottom: 14px; left: 0; right: 0;
        text-align: center;
        font-size: .7rem;
        letter-spacing: .18em;
        color: rgba(160,110,60,0.6);
        text-transform: uppercase;
        pointer-events: none;
        z-index: 5;
      }

      /* furnace side */
      .furnace-side {
        width: 55%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .furnace-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .furnace-body {
        width: clamp(100px, 18vw, 200px);
        height: clamp(130px, 23vw, 260px);
        border-radius: 12px 12px 6px 6px;
        background: linear-gradient(180deg, #3a1a06 0%, #1e0c02 100%);
        border: 3px solid #5a2a08;
        position: relative;
        box-shadow:
          0 0 40px rgba(255,100,20,0.15),
          inset 0 2px 8px rgba(0,0,0,0.8);
        transition: box-shadow 0.3s ease;
        overflow: hidden;
      }

      .furnace-body.flare {
        box-shadow:
          0 0 80px rgba(255,140,20,0.8),

      @keyframes furnace-flicker {

      .furnace-glow {
        position: absolute;
        inset: -40px;

      }
      @keyframes glow-pulse {
        from { opacity:.7; transform:scale(.95); }
        to   { opacity:1;  transform:scale(1.05); }

      .furnace-rivets {
        position: absolute;
        top: 10px; left: 0; right: 0;
        display: flex;
        justify-content: space-around;
        padding: 0 8px;
      }
      .rivet {
        width: 8px; height: 8px;
        border-radius: 50%;

      .furnace-label {
        position: absolute;
        bottom: -28px;

      /* coal chunks */
      .coal {

      /* flying coal */

      .screen {
        position: absolute; inset: 0; z-index: 50;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px; text-align: center; padding: 24px;

        font-size: clamp(.8rem,2.5vw,1rem);

      .start-title {

      .s-btn {

      .w-emoji { font-size: clamp(2rem,6vw,3.5rem); }

        font-size: clamp(2rem,6.5vw,4rem); font-weight:900; color:#ffd700;

      @keyframes bpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

      /* game over */
      .gameover-screen {

      /* confetti */
      .conf {

      @keyframes cffall {

        to   { transform:translateY(105vh) rotate(800deg) translateX(var(--dx)); opacity:0; }

      .level-flash {
        position:fixed; inset:0; pointer-events:none; z-index:40;

        animation:lflash .6s ease-out forwards;
      }
      @keyframes lflash {
        0%   { opacity:1; }
        100% { opacity:0; }
      }
    `;

    /* ── coal SVG ───────────────────────────────────────────────── */
    function CoalSVG({ size = 48, shine = false }) {
      const s = size;
      return (
        <svg width={s} height={s} viewBox="0 0 48 48" style={{ display:"block", filter: shine ? "drop-shadow(0 0 6px rgba(255,180,60,0.7))" : "none" }}>
          {/* main blob */}
          <ellipse cx="24" cy="26" rx="19" ry="16" fill="#1a1a1a" />
          <ellipse cx="20" cy="16" rx="12" ry="10" fill="#1c1c1c" />
          <ellipse cx="32" cy="19" rx="10" ry="9" fill="#181818" />
          {/* shine highlight */}
          <ellipse cx="17" cy="14" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(-20,17,14)" />
          <ellipse cx="15" cy="13" rx="2" ry="1.2" fill="rgba(255,255,255,0.22)" transform="rotate(-20,15,13)" />
          {/* dark facets */}
          <ellipse cx="30" cy="30" rx="7" ry="5" fill="#111" opacity="0.6" />
          <ellipse cx="14" cy="28" rx="5" ry="4" fill="#111" opacity="0.5" />
        </svg>
      );
    }

    /* ── confetti ───────────────────────────────────────────────── */
    const CONF_COLORS = ["#ffd700","#ff4444","#44aaff","#44ff88","#ff88ff","#ffaa44"];
    function Confetti() {
      const pieces = Array.from({ length: 60 }, (_, i) => ({
        id: i,
        x: Math.random() * 100,
        w: 6 + Math.random() * 8,
        h: 4 + Math.random() * 6,
        color: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
        d: 2.5 + Math.random() * 3.5,
        delay: Math.random() * 2.5,
        dx: (Math.random() - 0.5) * 200,
      }));
      return (
        <>
          {pieces.map(p => (
            <div key={p.id} className="conf" style={{
              left: p.x + "vw",
              width: p.w, height: p.h,
              background: p.color,
              "--d": p.d + "s",
              "--delay": p.delay + "s",
              "--dx": p.dx + "px",
            }} />
          ))}
        </>
      );
    }

    /* ── main game component ────────────────────────────────────── */
    function CoalShoveler() {
      const [screen, setScreen] = useState("start"); // start | play | win | gameover
      const [coalChunks, setCoalChunks] = useState([]);
      const [score, setScore] = useState(0);
      const [speed, setSpeed] = useState(100);
      const [flare, setFlare] = useState(false);
      const [flyParticles, setFlyParticles] = useState([]);
      const [showLevelFlash, setShowLevelFlash] = useState(false);
      const [prevLevel, setPrevLevel] = useState(null);

      const gameRef = useRef({ running: false });
      const speedRef = useRef(100);
      const scoreRef = useRef(0);
      const chunksRef = useRef([]);
      const furnaceRef = useRef(null);
      const rafRef = useRef(null);
      const spawnTimerRef = useRef(null);
      const lastDrainRef = useRef(null);
      const chunkTimersRef = useRef({});

      // sync refs
      useEffect(() => { speedRef.current = speed; }, [speed]);
      useEffect(() => { scoreRef.current = score; }, [score]);
      useEffect(() => { chunksRef.current = coalChunks; }, [coalChunks]);

      const stopGame = useCallback(() => {
        gameRef.current.running = false;
        if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
        if (spawnTimerRef.current) { clearInterval(spawnTimerRef.current); spawnTimerRef.current = null; }
        Object.values(chunkTimersRef.current).forEach(t => clearTimeout(t));
        chunkTimersRef.current = {};
        lastDrainRef.current = null;
      }, []);

      const spawnCoal = useCallback(() => {
        if (!gameRef.current.running) return;
        const current = chunksRef.current;
        if (current.length >= MAX_COAL) return;
        const id = ++uid;
        const lvl = getLevel(scoreRef.current);
        const chunk = {
          id,
          x: 2 + Math.random() * 38,   // % of screen width, within left 45%
          y: 18 + Math.random() * 62,   // % of screen height, 18–80%
          born: Date.now(),
          life: lvl.coalLife,
        };
        setCoalChunks(prev => [...prev, chunk]);

        // auto-expire
        const t = setTimeout(() => {
          setCoalChunks(prev => prev.filter(c => c.id !== id));
          delete chunkTimersRef.current[id];
        }, lvl.coalLife);
        chunkTimersRef.current[id] = t;
      }, []);

      const drainLoop = useCallback((ts) => {
        if (!gameRef.current.running) return;
        if (lastDrainRef.current === null) lastDrainRef.current = ts;
        const dt = (ts - lastDrainRef.current) / 1000;
        lastDrainRef.current = ts;

        const lvl = getLevel(scoreRef.current);
        const newSpeed = Math.max(0, speedRef.current - lvl.drainPerSec * dt);
        speedRef.current = newSpeed;
        setSpeed(newSpeed);

        if (newSpeed <= 0) {
          stopGame();
          snd.gameOver();
          setScreen("gameover");
          return;
        }
        rafRef.current = requestAnimationFrame(drainLoop);
      }, [stopGame]);

      const startGame = useCallback(() => {
        // reset
        stopGame();
        setCoalChunks([]);
        setScore(0);
        setSpeed(100);
        setFlyParticles([]);
        setShowLevelFlash(false);
        setPrevLevel(LEVELS[0].label);
        speedRef.current = 100;
        scoreRef.current = 0;
        chunksRef.current = [];
        chunkTimersRef.current = {};
        lastDrainRef.current = null;
        gameRef.current.running = true;

        setScreen("play");

        // small delay before drain starts so React can render
        setTimeout(() => {
          rafRef.current = requestAnimationFrame(drainLoop);
          spawnTimerRef.current = setInterval(spawnCoal, SPAWN_INTERVAL);
        }, 120);
      }, [stopGame, drainLoop, spawnCoal]);

      // cleanup on unmount
      useEffect(() => () => stopGame(), [stopGame]);

      const shovelCoal = useCallback((chunkId, e) => {
        if (!gameRef.current.running) return;
        e.stopPropagation();

        // get coal position
        const el = e.currentTarget;
        const rect = el.getBoundingClientRect();
        const coalCx = rect.left + rect.width / 2;
        const coalCy = rect.top + rect.height / 2;

        // get furnace center
        let furnaceCx = window.innerWidth * 0.73;
        let furnaceCy = window.innerHeight * 0.5;
        if (furnaceRef.current) {
          const fr = furnaceRef.current.getBoundingClientRect();
          furnaceCx = fr.left + fr.width / 2;
          furnaceCy = fr.top + fr.height / 2;
        }

        // remove chunk
        if (chunkTimersRef.current[chunkId]) {
          clearTimeout(chunkTimersRef.current[chunkId]);
          delete chunkTimersRef.current[chunkId];
        }
        setCoalChunks(prev => prev.filter(c => c.id !== chunkId));

        // flying particle
        const flyId = ++uid;
        const tx = furnaceCx - coalCx;
        const ty = furnaceCy - coalCy;
        setFlyParticles(prev => [...prev, { id: flyId, x: coalCx - 24, y: coalCy - 24, tx, ty }]);
        setTimeout(() => setFlyParticles(prev => prev.filter(p => p.id !== flyId)), 500);

        // sounds
        snd.shovel();
        setTimeout(() => snd.furnace(), 280);

        // furnace flare
        setFlare(true);
        setTimeout(() => setFlare(false), 500);

        // update score + speed
        const newScore = scoreRef.current + 1;
        scoreRef.current = newScore;
        setScore(newScore);

        const newSpeed = Math.min(100, speedRef.current + 12);
        speedRef.current = newSpeed;
        setSpeed(newSpeed);

        // level up check
        const oldLvl = getLevel(newScore - 1).label;
        const newLvl = getLevel(newScore).label;
        if (newLvl !== oldLvl) {
          snd.levelUp();
          setShowLevelFlash(true);
          setTimeout(() => setShowLevelFlash(false), 600);
        }

        // win check
        if (newScore >= WIN_COAL) {
          stopGame();
          snd.win();
          setScreen("win");
        }
      }, [stopGame]);

      /* gauge color */
      const gaugeColor = speed > 60 ? "green" : speed > 30 ? "yellow" : "red";
      const currentLevel = getLevel(score);

      /* ── render ─────────────────────────────────────────────── */
      return (
        <div className="cs-root">
          <style>{CSS}</style>

          {/* stars */}
          {STARS.map(s => (
            <div key={s.id} className="st" style={{
              left: s.x + "vw", top: s.y + "vh",
              width: s.s, height: s.s,
              "--d": s.d + "s",
            }} />
          ))}

          {/* snow */}
          {SNOWFLAKES.map(s => (
            <div key={s.id} className="sn" style={{
              left: s.x + "vw",
              width: s.s, height: s.s,
              "--d": s.d + "s",
              "--delay": "-" + s.delay + "s",
              "--dx": s.dx + "px",
            }} />
          ))}

          {/* ── start screen ── */}
          {screen === "start" && (
            <div className="screen" style={{ background: "radial-gradient(ellipse at 50% 40%, rgba(14,26,82,0.95) 0%, rgba(4,9,24,0.98) 100%)" }}>
              <div className="start-eyebrow">The Polar Express</div>
              <div className="start-title">Coal Shoveler</div>
              <div className="start-sub">Keep the Polar Express running!</div>
              <div className="start-desc">
                <strong>Coal chunks</strong> appear in the pile — tap them fast to shovel into the furnace!<br />
                The <strong>speed gauge</strong> drains constantly. Shovel coal to keep it up.<br />
                Reach <strong>{WIN_COAL} coal</strong> to make it to the North Pole!
              </div>
              <button className="s-btn" onClick={startGame}>🔥 Fire it up!</button>
            </div>
          )}

          {/* ── game screen ── */}
          {screen === "play" && (
            <>
              {/* HUD */}
              <div className="hud">
                <div className="speed-gauge-wrap">
                  <div className="gauge-label">
                    <span className="gauge-title">⚡ Speed</span>
                    <span className="gauge-pct">{Math.round(speed)}%</span>
                  </div>
                  <div className="gauge-track">
                    <div className={"gauge-fill " + gaugeColor} style={{ width: speed + "%" }} />
                  </div>
                </div>
                <div className="hud-right">
                  <div className="hud-score-label">Coal</div>
                  <div className="hud-score">{score}<span style={{fontSize:".7em",color:"#8070a0"}}>/{WIN_COAL}</span></div>
                </div>
              </div>

              <div className="level-badge">{currentLevel.label}</div>

              {/* game area */}
              <div className="game-area" style={{ top: 0 }}>
                {/* coal pile side */}
                <div className="coal-side">
                  {coalChunks.map(chunk => {
                    const elapsed = Date.now() - chunk.born;
                    const pct = Math.max(0, 1 - elapsed / chunk.life);
                    const isUrgent = pct < 0.3;
                    return (
                      <div
                        key={chunk.id}
                        className="coal"
                        style={{
                          left: chunk.x + "vw",
                          top: chunk.y + "vh",
                          opacity: 0.4 + pct * 0.6,
                          transform: `scale(${0.8 + pct * 0.3})`,
                          filter: isUrgent ? "drop-shadow(0 0 8px rgba(255,100,20,0.8))" : "none",
                          transition: "opacity 0.15s, transform 0.15s",
                        }}
                        onPointerDown={(e) => shovelCoal(chunk.id, e)}
                      >
                        <CoalSVG size={48} shine={isUrgent} />
                        {/* timer ring */}
                        <svg className="coal-timer" width="14" height="14" viewBox="0 0 14 14">
                          <circle cx="7" cy="7" r="5.5" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="2" />
                          <circle cx="7" cy="7" r="5.5" fill="none"
                            stroke={pct > 0.5 ? "#44dd44" : pct > 0.25 ? "#ffd700" : "#ff4422"}
                            strokeWidth="2"
                            strokeDasharray={`${pct * 34.56} 34.56`}
                            strokeLinecap="round"
                            transform="rotate(-90 7 7)"
                          />
                        </svg>
                      </div>
                    );
                  })}
                  <div className="coal-pile-label">Coal Pile</div>
                </div>

                {/* furnace side */}
                <div className="furnace-side">
                  <div className="furnace-wrap">
                    <div ref={furnaceRef} className={"furnace-body" + (flare ? " flare" : "")}>
                      <div className="furnace-rivets">
                        <div className="rivet" /><div className="rivet" /><div className="rivet" />
                      </div>
                      <div className="furnace-door" />
                    </div>
                    <div className="furnace-glow" />
                    <div className="furnace-label">Furnace</div>
                  </div>
                </div>
              </div>

              {/* flying coal particles */}
              {flyParticles.map(p => (
                <div key={p.id} className="coal-fly" style={{
                  left: p.x, top: p.y,
                  "--tx": p.tx + "px",
                  "--ty": p.ty + "px",
                  "--fly-dur": "0.45s",
                }}>
                  <CoalSVG size={40} />
                </div>
              ))}

              {/* level flash */}
              {showLevelFlash && <div className="level-flash" />}
            </>
          )}

          {/* ── win screen ── */}
          {screen === "win" && (
            <div className="screen win-screen">
              <Confetti />
              <div className="w-emoji">🎄🎁🎄</div>
              <div className="w-title">North Pole Reached!</div>
              <div className="w-sub">The Polar Express has arrived!</div>
              <div className="w-believe">BELIEVE</div>
              <div className="w-count">You shoveled {score} coal pieces to get here!</div>
              <button className="s-btn" onClick={startGame}>Play Again</button>
            </div>
          )}

          {/* ── game over screen ── */}
          {screen === "gameover" && (
            <div className="screen gameover-screen">
              <div style={{ fontSize:"clamp(2.5rem,8vw,5rem)" }}>🚂💨</div>
              <div className="go-title">The Train Stopped!</div>
              <div className="go-sub">The furnace ran cold…</div>
              <div className="go-count">{score} coal piece{score !== 1 ? "s" : ""} shoveled</div>
              <div style={{ fontSize:".9rem", color:"rgba(200,160,140,0.7)" }}>
                {score < 8 ? "Keep trying — you can do it!" :
                 score < 17 ? "So close! The North Pole was calling!" :
                 "Amazing effort — you almost made it!"}
              </div>
              <button className="s-btn" onClick={startGame}>Try Again</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CoalShoveler />);
  </script>
</body>
</html>
